server {
    listen 80;
    server_name _;

    # Главная страница — отдаем наш фронтенд
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # pgAdmin — доступен по /pgadmin/ (Временно отключен)
#    location /pgadmin/ {
#        proxy_pass http://pgadmin:80;
#        proxy_set_header Host $host;
#        proxy_set_header X-Real-IP $remote_addr;
#        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#        proxy_set_header X-Script-Name /pgadmin;
#    }

    # Backend API — доступен по /api/ (только внутри машины, порт не торчит наружу)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # Документация FastAPI (только для работы внутри, закрыто от внешнего мира)
#    location /docs {
#        proxy_pass http://backend:8000/docs;
#        proxy_set_header Host $host;
#    }
#
#    location /openapi.json {
#        proxy_pass http://backend:8000/openapi.json;
#        proxy_set_header Host $host;
#    }
}
