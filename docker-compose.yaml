    #       - /root/.docker:/config:ro
    #     environment:
    #       - DOCKER_API_VERSION=${DOCKER_API_VERSION-1.54}
    #       - DOCKER_CONFIG=/config
    #     network_mode: host
    #     # Проверяет обновления каждые 5 минут (300 секунд) и очищает старые образы:
    #     command: --interval 300 --cleanup --debug

  backend:
    image: localhost:5000/backend_api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - internal_net # Порт не пробрасывается — только внутри машины через Nginx
    depends_on:
      - postgres

networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true # Полностью запрещает доступ к сети из внешнего интернета или публикацию портов сисадминами случайно

volumes:
  pgdata:
  registry_data:
